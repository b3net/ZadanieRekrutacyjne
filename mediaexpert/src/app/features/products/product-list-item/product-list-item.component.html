<div class="card mb-2 shadow-sm">
  <div class="card-body d-flex justify-content-between align-items-center">
    <div>
      <h5 class="card-title text-primary">{{ product.name }}</h5>
      <h6 class="card-subtitle mb-2 text-muted">{{ 'product-item.code' | translate }}: {{ product.code }}</h6>
    </div>
    <div class="text-end">
      <span class="badge bg-success fs-6">{{ product.price | money }}</span>
    </div>
  </div>
</div>
