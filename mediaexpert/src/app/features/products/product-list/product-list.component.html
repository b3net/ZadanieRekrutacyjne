<div class="container-fluid mt-4 px-lg-5">
  <div class="row g-4">
    <div class="col-lg-8 order-2 order-lg-1">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-0">
            <h2 class="h4 mb-0 fw-bold">{{ 'product-list.title' | translate }}</h2>
            <button class="btn btn-sm btn-outline-primary" (click)="loadProducts()">
              {{ 'product-list.refresh' | translate }}
            </button>
          </div>
        </div>
      </div>

      <app-pagination 
        [pageNumber]="paginationListService.pageNumber()" 
        [totalPages]="paginationListService.totalPages()" 
        [totalCount]="paginationListService.totalCount()"
        [pageSize]="paginationListService.pageSize()"
        (pageChange)="loadProducts($event)"
        (pageSizeChange)="onPageSizeChange($event)">
      </app-pagination>
      
      <div class="position-relative mt-4" style="min-height: 200px;">
        @if (loaderService.isLoading()) {
          <div class="d-flex justify-content-center py-5">
            <div class="spinner-border text-primary"></div>
          </div>
        } @else if (paginationListService.items().length === 0) {
          <div class="alert alert-info border-0 shadow-sm">{{ 'product-list.empty' | translate }}</div>
        } @else {
          <div class="product-list">
            @for (product of paginationListService.items(); track product.id) {
              <app-product-list-item [product]="product"></app-product-list-item>
            }
          </div>
        }
      </div>
    </div>

    <div class="col-lg-4 order-1 order-lg-2">
      <div class="sticky-top" style="top: 1.5rem;">
        <app-product-form (productAdded)="loadProducts()"></app-product-form>
      </div>
    </div>
  </div>
</div>
